services:
  # Service Web Django
  - type: web
    name: eventhub-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    autoDeploy: yes
    
    # Variables d'environnement
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings.production
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
        
  # Service PostgreSQL
  - type: pserv
    name: eventhub-db
    env: postgres
    plan: free
    databases:
      - name: libredb
        user: libre_user
        
# Configuration du déploiement
version: "1"
